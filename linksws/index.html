<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WN Systems Lab - Clientes</title>
    <style>
        /* Importando uma fonte moderna do Google */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            color: #e0b976; /* O Dourado Premium do seu SaaS */
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 16px;
            font-weight: 400;
            color: #bbb;
        }

        /* Container que alinha os botões */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 400px; /* Tamanho perfeito para celular */
        }

        /* Estilo do Botão/Card */
        .link-card {
            display: flex;
            align-items: center;
            gap: 16px;
            background-color: #1e1e1e;
            padding: 16px;
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            border: 1px solid #333;
            transition: all 0.3s ease;
        }

        /* Efeito ao passar o mouse */
        .link-card:hover {
            transform: translateY(-4px);
            border-color: #e0b976;
            box-shadow: 0 8px 20px rgba(224, 185, 118, 0.15);
        }

        .link-card img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #e0b976;
        }

        .link-card h3 {
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header>
        <h1>WN Systems Lab</h1>
        <h2>Central de Agendamentos Barbers</h2>
    </header>

    <main class="links-container">
        
        <a href="https://barbearia-agendamentos-lovat.vercel.app/public/booking.html?" target="_blank" rel="noopener noreferrer" class="link-card">
            <img src="brand/labarber.png" alt="Logo Guilherme">
            <h3>Guilherme La Barber Clube</h3>
        </a>

        <a href="https://agendabiel.vercel.app/public/booking.html" target="_blank" rel="noopener noreferrer" class="link-card">
            <img src="brand/biellogo.png" alt="Logo Biel">
            <h3>Barbearia Biel do Corte</h3>
        </a>

        <a href="https://agendamentosbarbers.vercel.app/public/booking.html?tenant=jef-barbearia" target="_blank" rel="noopener noreferrer" class="link-card">
            <img src="brand/jeflogo.png" alt="Logo Jef">
            <h3>Barbearia Jef</h3>
        </a>

        <a href="https://agendamentosbarbers.vercel.app/public/booking.html?tenant=leodias" target="_blank" rel="noopener noreferrer" class="link-card">
            <img src="brand/leologo.png" alt="Logo Leo Dias">
            <h3>Leo Dias Barbershop</h3>
        </a>

    </main>

</body>
</html>
