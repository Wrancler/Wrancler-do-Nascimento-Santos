<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin • Login</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="La Barber">
    <link rel="apple-touch-icon" href="/public/assets/brand/logo001.png?v=1">
    <link rel="icon" type="image/png" href="/public/assets/brand/logo001.png?v=1">




  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero__bg"></div>
    <div class="container hero__content">
      <div class="topbar">
        <div class="brand">
          <div class="brand__mark">
            <img class="brand__logo" src="../assets/brand/logo001.png" alt="Biel do Corte">
          </div>
          <div class="brand__info">
            <div class="brand__name">Biel Barbearia</div>
            <div class="brand__tag">Admin</div>
          </div>
        </div>

        <div class="hero__title">
          <h1>LOGIN</h1>
          <p>Acesso restrito para administração.</p>
        </div>
      </div>
    </div>
  </header>

  <main class="container main">
    <section class="section">
      <div class="section__head">
        <h2>Entrar</h2>
        <p>Use seu e-mail e senha.</p>
      </div>

      <div class="form">
        <label class="label">E-mail</label>
        <input class="input" id="email" type="email" autocomplete="email" placeholder="admin@exemplo.com" />

        <label class="label">Senha</label>
        <input class="input" id="password" type="password" autocomplete="current-password" placeholder="••••••••" />

        <button id="btnLogin" type="submit" style="width: 100%; background: #e0b976; color: #111; padding: 16px; border-radius: 12px; border: none; font-weight: 700; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.2s; margin-top: 16px; box-shadow: 0 4px 15px rgba(224, 185, 118, 0.2);">
  Entrar no Painel
</button>


        <div class="note errorbox" id="errorBox" style="display:none;"></div>
      </div>
    </section>

    <footer class="footer">
      <span>© <span id="year"></span> Biel do Corte</span>
    </footer>
  </main>

  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
  <script type="module" src="login.js"></script>
</body>
</html>
